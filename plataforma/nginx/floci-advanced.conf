# Sitios estaticos con S3 static website hosting (generico para cualquier bucket
# que tenga el hosting habilitado, no solo el Quiz). Floci enruta S3 por
# virtual-host (Host: <bucket>.s3-website.us-east-1.localhost:4566), por eso se
# reescribe el header Host en vez de solo pasar la ruta.
location ~ ^/site/(?<bucket>[a-zA-Z0-9.-]+)/(?<objpath>.*)$ {
    proxy_set_header Host "$bucket.s3-website.us-east-1.localhost:4566";
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://floci-floci-1:4566/$objpath$is_args$args;
}

# /site/<bucket> sin barra final -> agrega la barra (si no, las rutas relativas
# del index.html resolverian mal).
location ~ ^/site/(?<bucket2>[a-zA-Z0-9.-]+)$ {
    return 301 /site/$bucket2/;
}

# API Gateway (HTTP API), generico para cualquier api_id/ruta creados en Floci.
# Mismo patron _user_request_ que se usa hoy a traves del tunel SSH.
location /restapis/ {
    proxy_set_header Host "localhost:4566";
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://floci-floci-1:4566;
}
